<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>表面處理計價</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .header {
      padding: 18px 4px 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .header p {
      margin: 8px 0 0;
      color: #6e6e73;
      font-size: 15px;
      line-height: 1.5;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #1d1d1f;
    }

    .shape-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .shape-button {
      min-height: 52px;
      border: none;
      border-radius: 16px;
      background: #f2f2f7;
      color: #1d1d1f;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    .shape-button.active {
      background: #007aff;
      color: white;
    }

    .field {
      margin-bottom: 14px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
      color: #3a3a3c;
      font-size: 15px;
      font-weight: 600;
    }

    .unit {
      color: #8e8e93;
      font-size: 13px;
      font-weight: 500;
    }

    input,
    select {
      width: 100%;
      min-height: 52px;
      border: 1px solid #d1d1d6;
      border-radius: 14px;
      background: #ffffff;
      color: #1d1d1f;
      padding: 0 14px;
      font-size: 18px;
      font-weight: 500;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    select {
      background-image:
        linear-gradient(45deg, transparent 50%, #8e8e93 50%),
        linear-gradient(135deg, #8e8e93 50%, transparent 50%);
      background-position:
        calc(100% - 20px) 22px,
        calc(100% - 14px) 22px;
      background-size:
        6px 6px,
        6px 6px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    input:focus,
    select:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.16);
    }

    .hidden {
      display: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 4px;
      margin-bottom: 14px;
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      border: none;
      border-radius: 16px;
      background: #007aff;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary-button {
      width: 100%;
      min-height: 50px;
      border: none;
      border-radius: 16px;
      background: #e5e5ea;
      color: #1d1d1f;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary-button:active,
    .secondary-button:active,
    .shape-button:active {
      transform: scale(0.99);
    }

    .result-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 22px 18px;
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .result-label {
      font-size: 15px;
      color: #6e6e73;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .result-price {
      color: #007aff;
      font-size: 40px;
      line-height: 1.15;
      font-weight: 750;
      letter-spacing: -0.04em;
      min-height: 46px;
      word-break: break-all;
    }

    .detail {
      margin-top: 8px;
      color: #6e6e73;
      font-size: 14px;
      line-height: 1.45;
    }

    .note {
      margin-top: 12px;
      color: #8e8e93;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .error {
      color: #ff3b30;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    @media (min-width: 700px) {
      body {
        padding: 28px;
      }

      .app {
        margin-top: 18px;
      }

      .actions {
        grid-template-columns: 1fr 0.45fr;
      }
    }

    @media (max-width: 390px) {
      body {
        padding: 12px;
      }

      .header h1 {
        font-size: 28px;
      }

      .card {
        padding: 16px;
        border-radius: 20px;
      }

      input,
      select {
        font-size: 17px;
      }

      .result-price {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <h1>表面處理計價</h1>
      <p>選擇形狀與表面處理，輸入尺寸後計算最終價格。</p>
    </header>

    <section class="card">
      <div class="card-title">形狀</div>

      <div class="shape-grid">
        <button id="cylinderButton" class="shape-button active" onclick="setShape('cylinder')">
          圓柱體
        </button>

        <button id="boxButton" class="shape-button" onclick="setShape('box')">
          六面體
        </button>
      </div>
    </section>

    <section class="card">
      <div class="card-title">尺寸</div>

      <div id="cylinderFields">
        <div class="field">
          <label for="diameter">
            外徑
            <span class="unit">mm</span>
          </label>
          <input id="diameter" type="number" inputmode="decimal" step="0.01" placeholder="例如 25.4" />
        </div>

        <div class="field">
          <label for="length">
            長度
            <span class="unit">mm</span>
          </label>
          <input id="length" type="number" inputmode="decimal" step="0.01" placeholder="例如 100" />
        </div>
      </div>

      <div id="boxFields" class="hidden">
        <div class="field">
          <label for="boxLength">
            長
            <span class="unit">mm</span>
          </label>
          <input id="boxLength" type="number" inputmode="decimal" step="0.01" placeholder="例如 100" />
        </div>

        <div class="field">
          <label for="boxWidth">
            寬
            <span class="unit">mm</span>
          </label>
          <input id="boxWidth" type="number" inputmode="decimal" step="0.01" placeholder="例如 50" />
        </div>

        <div class="field">
          <label for="boxHeight">
            高
            <span class="unit">mm</span>
          </label>
          <input id="boxHeight" type="number" inputmode="decimal" step="0.01" placeholder="例如 30" />
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-title">表面處理</div>

      <div class="field">
        <label for="treatment">
          處理方式
          <span class="unit">基本價 / 最低價</span>
        </label>

        <select id="treatment">
          <option value="nickel">鍍鎳｜1｜最低 20</option>
          <option value="sandblast">噴砂｜0.5｜最低 10</option>
          <option value="sandblast_nickel">噴砂+鍍鎳｜1.3｜最低 30</option>
          <option value="anodize_clear">陽極本色｜1｜最低 10</option>
          <option value="anodize_black">陽極黑｜1.5｜最低 15</option>
          <option value="trivalent_chrome">三價鉻｜2｜最低 50</option>
          <option value="teflon">鐵氟龍｜3.5｜無最低價</option>
          <option value="strip_nickel">退皮+電鍍鎳｜1.5｜無最低價</option>
          <option value="copper_chrome">銅鍍鉻｜1｜最低 30</option>
        </select>
      </div>
    </section>

    <div class="actions">
      <button class="primary-button" onclick="calculatePrice()">計算價格</button>
      <button class="secondary-button" onclick="clearForm()">清除</button>
    </div>

    <section class="result-card">
      <div class="result-label">最終價格</div>
      <div id="result" class="result-price">—</div>
      <div id="detail" class="detail"></div>
    </section>

    <div class="note">
      以平方英寸計價；低於最低價時自動套用最低價。
    </div>
  </main>

  <script>
    let currentShape = "cylinder";

    const treatments = {
      nickel: {
        name: "鍍鎳",
        basePrice: 1,
        minimumPrice: 20
      },
      sandblast: {
        name: "噴砂",
        basePrice: 0.5,
        minimumPrice: 10
      },
      sandblast_nickel: {
        name: "噴砂+鍍鎳",
        basePrice: 1.3,
        minimumPrice: 30
      },
      anodize_clear: {
        name: "陽極本色",
        basePrice: 1,
        minimumPrice: 10
      },
      anodize_black: {
        name: "陽極黑",
        basePrice: 1.5,
        minimumPrice: 15
      },
      trivalent_chrome: {
        name: "三價鉻",
        basePrice: 2,
        minimumPrice: 50
      },
      teflon: {
        name: "鐵氟龍",
        basePrice: 3.5,
        minimumPrice: 0
      },
      strip_nickel: {
        name: "退皮+電鍍鎳",
        basePrice: 1.5,
        minimumPrice: 0
      },
      copper_chrome: {
        name: "銅鍍鉻",
        basePrice: 1,
        minimumPrice: 30
      }
    };

    function setShape(shape) {
      currentShape = shape;

      const cylinderFields = document.getElementById("cylinderFields");
      const boxFields = document.getElementById("boxFields");
      const cylinderButton = document.getElementById("cylinderButton");
      const boxButton = document.getElementById("boxButton");

      if (shape === "cylinder") {
        cylinderFields.classList.remove("hidden");
        boxFields.classList.add("hidden");
        cylinderButton.classList.add("active");
        boxButton.classList.remove("active");
      } else {
        cylinderFields.classList.add("hidden");
        boxFields.classList.remove("hidden");
        cylinderButton.classList.remove("active");
        boxButton.classList.add("active");
      }

      resetResult();
    }

    function calculatePrice() {
      const treatmentKey = document.getElementById("treatment").value;
      const treatment = treatments[treatmentKey];

      if (!treatment) {
        showError("表面處理資料錯誤");
        return;
      }

      let surfaceAreaMm2 = 0;

      if (currentShape === "cylinder") {
        const diameter = getNumber("diameter");
        const length = getNumber("length");

        if (!isPositive(diameter) || !isPositive(length)) {
          showError("請輸入正確尺寸");
          return;
        }

        const radius = diameter / 2;

        surfaceAreaMm2 =
          2 * Math.PI * radius * radius +
          2 * Math.PI * radius * length;
      }

      if (currentShape === "box") {
        const boxLength = getNumber("boxLength");
        const boxWidth = getNumber("boxWidth");
        const boxHeight = getNumber("boxHeight");

        if (!isPositive(boxLength) || !isPositive(boxWidth) || !isPositive(boxHeight)) {
          showError("請輸入正確尺寸");
          return;
        }

        surfaceAreaMm2 =
          2 * (
            boxLength * boxWidth +
            boxLength * boxHeight +
            boxWidth * boxHeight
          );
      }

      const squareInchMm2 = 25.4 * 25.4;
      const areaIn2 = surfaceAreaMm2 / squareInchMm2;
      const calculatedPrice = areaIn2 * treatment.basePrice;
      const finalPrice = Math.max(calculatedPrice, treatment.minimumPrice);

      document.getElementById("result").textContent =
        Math.round(finalPrice) + " 元";

      const minimumText =
        treatment.minimumPrice > 0
          ? "最低 " + treatment.minimumPrice + " 元"
          : "無最低價";

      document.getElementById("detail").textContent =
        treatment.name + "｜基本價 " + treatment.basePrice + "｜" + minimumText;
    }

    function getNumber(id) {
      return parseFloat(document.getElementById(id).value);
    }

    function isPositive(value) {
      return !isNaN(value) && value > 0;
    }

    function showError(message) {
      document.getElementById("result").innerHTML =
        '<span class="error">' + message + '</span>';
      document.getElementById("detail").textContent = "";
    }

    function resetResult() {
      document.getElementById("result").textContent = "—";
      document.getElementById("detail").textContent = "";
    }

    function clearForm() {
      document.getElementById("diameter").value = "";
      document.getElementById("length").value = "";
      document.getElementById("boxLength").value = "";
      document.getElementById("boxWidth").value = "";
      document.getElementById("boxHeight").value = "";
      resetResult();
    }
  </script>
</body>
</html>
